<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title><!-- APP_NAME --></title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style><!-- STYLE_INLINE --></style>
  <script type="application/json" id="app-config"><!-- APP_CONFIG --></script>
  <script><!-- SDK_INLINE --></script>
</head>
<body>
  <header class="olladroid-header" role="banner">
    <div class="olladroid-header__left">
      <div class="olladroid-logo" id="app-logo" aria-hidden="true">::</div>
      <span id="app-title"><!-- APP_NAME --></span>
    </div>
    <div class="olladroid-header__right">
      <span id="connection-status" aria-live="polite"></span>
    </div>
  </header>

  <div class="olladroid-info-bar" id="info-bar" role="region" aria-label="Session info">
    <span class="olladroid-info-bar__group">
      <span>Model</span>
      <span class="olladroid-info-tag" id="model-badge">—</span>
    </span>
    <span class="olladroid-info-bar__group">
      <span>Host</span>
      <span class="olladroid-info-tag" id="host-badge">local</span>
    </span>
  </div>

  <main id="app-root"><!-- APP_BODY --></main>

  <script><!-- APP_SCRIPT --></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function () {});
    }
  </script>
</body>
</html>
