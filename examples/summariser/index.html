<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>Summariser</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>/* =============================================================================
 * templates/_base/style.css — olladroid shared base layout
 *
 * Design language: Teenage Engineering, mirroring pwa/chat.html.
 *   - Black background (#000000), white text, seven-step gray ramp.
 *   - Single accent: #ff5c00 (TE orange).
 *   - Space Mono for UI chrome (labels, tags, status indicators).
 *   - DM Sans for body text (hints, feedback sentences).
 *   - Square corners. 1–2px borders. No drop shadows, no gradients.
 *   - Uppercase labels with heavy letter-spacing (1–3px) at 9–11px.
 *   - Square status dots, not round. Invert-on-active buttons.
 *
 * Design constraints (from requirements/plans/scaffolding-system.md):
 *   - Mobile-first. Every scaffolded app must be usable on a phone in one hand.
 *   - Respect prefers-reduced-motion.
 *   - 48px minimum tap target where the user actually needs to tap (WCAG 2.5.5).
 *   - Keyboard focus must always be visible.
 *   - Safe-area insets for notches, gesture bars, rounded corners.
 *   - Tokens as CSS variables so per-template overrides stay scoped.
 *   - Dark only. The TE aesthetic is dark — no prefers-color-scheme flip.
 *
 * Fonts: Space Mono + DM Sans. Scaffolder copies pwa/fonts/ into each app
 * so these @font-face URLs resolve; if they 404 (test env), font-display:
 * swap falls through to the system monospace / system-ui stacks.
 *
 * What lives here vs in a per-template stylesheet:
 *   - Tokens (colour, space, radius, type scale)
 *   - Element defaults (button, input, h1-h4, p, pre, code, a)
 *   - The shared header (.olladroid-header) + info bar + main
 *   - Utility primitives: .olladroid-banner, .olladroid-stack, .olladroid-info-tag
 * Per-template CSS goes inline in body.html; don't bloat _base with
 * game-specific layout.
 * ========================================================================== */

/* -----------------------------------------------------------------------------
 * Fonts — woff2 shipped from pwa/fonts/, copied per-app by cli/scaffold.js
 * -------------------------------------------------------------------------- */

@font-face {
  font-family: 'Space Mono';
  src: url('./fonts/space-mono-regular.woff2') format('woff2');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: 'Space Mono';
  src: url('./fonts/space-mono-bold.woff2') format('woff2');
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: 'DM Sans';
  src: url('./fonts/dm-sans-variable.woff2') format('woff2-variations'),
       url('./fonts/dm-sans-variable.woff2') format('woff2');
  font-weight: 100 1000;
  font-style: normal;
  font-display: swap;
}

/* -----------------------------------------------------------------------------
 * Tokens
 * -------------------------------------------------------------------------- */

:root {
  color-scheme: dark;

  /* Greyscale ramp — matches pwa/chat.html so the whole project reads as
   * one design system. */
  --olladroid-black: #000000;
  --olladroid-white: #ffffff;
  --olladroid-gray-1: #111111;
  --olladroid-gray-2: #1a1a1a;
  --olladroid-gray-3: #222222;
  --olladroid-gray-4: #333333;
  --olladroid-gray-5: #666666;
  --olladroid-gray-6: #999999;
  --olladroid-gray-7: #cccccc;
  --olladroid-orange: #ff5c00;

  /* Semantic aliases — keeps `--olladroid-bg` etc. consistent with earlier
   * scaffolding work without flipping every template ref when the palette
   * changes. */
  --olladroid-bg: var(--olladroid-black);
  --olladroid-bg-raised: var(--olladroid-gray-1);
  --olladroid-bg-hover: var(--olladroid-gray-2);
  --olladroid-fg: var(--olladroid-white);
  --olladroid-fg-muted: var(--olladroid-gray-6);
  --olladroid-fg-subtle: var(--olladroid-gray-5);
  --olladroid-border-color: var(--olladroid-gray-3);
  --olladroid-border-strong: var(--olladroid-gray-4);
  --olladroid-accent: var(--olladroid-orange);
  --olladroid-accent-hover: #ff7722;
  --olladroid-accent-fg: var(--olladroid-black);
  --olladroid-success: var(--olladroid-white);  /* TE palette encodes state via typography, not colour */
  --olladroid-warning: var(--olladroid-orange);
  --olladroid-error: var(--olladroid-gray-5);
  --olladroid-focus-ring: var(--olladroid-orange);

  /* Spacing scale — base 4px, tight on mobile. */
  --olladroid-space-1: 0.25rem;
  --olladroid-space-2: 0.5rem;
  --olladroid-space-3: 0.75rem;
  --olladroid-space-4: 1rem;
  --olladroid-space-5: 1.5rem;
  --olladroid-space-6: 2rem;
  --olladroid-space-7: 3rem;

  /* Type scale — small by default; chrome is intentionally tiny (9–11px)
   * with heavy tracking, body text reads at 13–14px. */
  --olladroid-font-size-2xs: 0.5625rem;  /* 9px  — chrome labels */
  --olladroid-font-size-xs: 0.6875rem;   /* 11px — tags, captions */
  --olladroid-font-size-sm: 0.8125rem;   /* 13px — body */
  --olladroid-font-size-base: 0.875rem;  /* 14px — controls */
  --olladroid-font-size-md: 1rem;        /* 16px — prompts */
  --olladroid-font-size-lg: 1.125rem;    /* 18px — hints */
  --olladroid-font-size-xl: 1.5rem;      /* 24px — emphasis */
  --olladroid-font-size-2xl: 2rem;       /* 32px — hero */

  --olladroid-line-height-tight: 1.15;
  --olladroid-line-height-body: 1.6;

  /* Layout */
  --olladroid-max-width: 40rem;
  --olladroid-header-height: 48px;

  /* Accessibility */
  --olladroid-tap-min: 48px;
  --olladroid-focus-ring-width: 2px;
  --olladroid-focus-ring-offset: 2px;

  /* Motion */
  --olladroid-transition-fast: 120ms ease;
  --olladroid-transition-slow: 240ms ease;

  /* Fonts — Space Mono fallbacks to Courier, DM Sans fallbacks to system-ui. */
  --olladroid-mono: 'Space Mono', 'SF Mono', 'Courier New', Menlo, Consolas, monospace;
  --olladroid-sans: 'DM Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;

  --olladroid-safe-top: env(safe-area-inset-top, 0px);
  --olladroid-safe-bottom: env(safe-area-inset-bottom, 0px);
  --olladroid-safe-left: env(safe-area-inset-left, 0px);
  --olladroid-safe-right: env(safe-area-inset-right, 0px);
}

/* -----------------------------------------------------------------------------
 * Reset + base
 * -------------------------------------------------------------------------- */

*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  background: var(--olladroid-bg);
  color: var(--olladroid-fg);
  font-family: var(--olladroid-mono);
  font-size: var(--olladroid-font-size-base);
  line-height: var(--olladroid-line-height-body);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-text-size-adjust: 100%;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body {
  display: flex;
  flex-direction: column;
}

/* The `hidden` attribute must always win. The UA sheet sets
 * `[hidden] { display: none }`, but author rules like `button { display:
 * inline-flex }` out-cascade it and leave `<button hidden>` visible. */
[hidden] {
  display: none !important;
}

/* Typography defaults */

h1,
h2,
h3,
h4 {
  font-family: var(--olladroid-mono);
  font-weight: 700;
  line-height: var(--olladroid-line-height-tight);
}

h1 {
  font-size: var(--olladroid-font-size-2xl);
  letter-spacing: -0.01em;
}

h2 {
  font-size: var(--olladroid-font-size-xl);
  letter-spacing: -0.005em;
}

h3 {
  font-size: var(--olladroid-font-size-lg);
}

p {
  font-family: var(--olladroid-sans);
  margin: 0 0 var(--olladroid-space-3);
  color: var(--olladroid-gray-7);
  line-height: 1.7;
}

p:last-child {
  margin-bottom: 0;
}

a {
  color: var(--olladroid-orange);
  text-decoration: underline;
  text-underline-offset: 0.2em;
  text-decoration-thickness: 1px;
}

code,
kbd,
samp {
  font-family: var(--olladroid-mono);
  font-size: 0.95em;
  padding: 1px 6px;
  background: var(--olladroid-gray-2);
  border: 1px solid var(--olladroid-gray-3);
  color: var(--olladroid-orange);
}

pre {
  margin: 0 0 var(--olladroid-space-3);
  padding: var(--olladroid-space-3) var(--olladroid-space-4);
  background: var(--olladroid-gray-1);
  border: 1px solid var(--olladroid-gray-3);
  overflow-x: auto;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  font-family: var(--olladroid-mono);
  font-size: var(--olladroid-font-size-xs);
  color: var(--olladroid-gray-7);
}

pre code {
  padding: 0;
  background: none;
  border: none;
  color: inherit;
}

hr {
  border: 0;
  border-top: 1px solid var(--olladroid-gray-3);
  margin: var(--olladroid-space-5) 0;
}

/* Keyboard focus — always visible, orange outline. */

:focus {
  outline: none;
}

:focus-visible {
  outline: var(--olladroid-focus-ring-width) solid var(--olladroid-focus-ring);
  outline-offset: var(--olladroid-focus-ring-offset);
}

/* -----------------------------------------------------------------------------
 * Layout — header, info bar, main
 * -------------------------------------------------------------------------- */

.olladroid-header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--olladroid-space-3);
  min-height: var(--olladroid-header-height);
  padding: calc(10px + var(--olladroid-safe-top)) var(--olladroid-space-4) 10px;
  padding-left: calc(var(--olladroid-space-4) + var(--olladroid-safe-left));
  padding-right: calc(var(--olladroid-space-4) + var(--olladroid-safe-right));
  background: var(--olladroid-black);
  border-bottom: 1px solid var(--olladroid-gray-3);
  font-family: var(--olladroid-mono);
}

.olladroid-header__left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  flex: 1 1 auto;
}

.olladroid-header__right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 0 0 auto;
}

/* TE-style logo square with 2-letter app mark. Templates set textContent
 * via JS (or leave the default markup). */
.olladroid-logo {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--olladroid-black);
  border: 2px solid var(--olladroid-white);
  border-radius: 0;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: -1px;
  color: var(--olladroid-white);
  flex: 0 0 auto;
}

#app-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--olladroid-white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Status indicator — a square dot (not round) + uppercase label. */
#connection-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: var(--olladroid-font-size-2xs);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--olladroid-gray-6);
  font-weight: 400;
}

#connection-status::before {
  content: "";
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--olladroid-gray-5);
  border-radius: 0; /* square */
  transition: background var(--olladroid-transition-fast);
}

#connection-status:empty {
  display: none;
}

#connection-status[data-state="ok"]::before {
  background: var(--olladroid-white);
}

#connection-status[data-state="warn"]::before {
  background: var(--olladroid-orange);
  animation: olladroid-blink 0.8s step-end infinite;
}

#connection-status[data-state="err"]::before {
  background: var(--olladroid-gray-5);
}

@keyframes olladroid-blink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.2; }
}

/* Info bar — renders model / ageGroup / score tags in a thin strip below
 * the header. Optional; templates that don't want it simply omit the
 * .olladroid-info-bar block. */
.olladroid-info-bar {
  display: flex;
  align-items: center;
  gap: var(--olladroid-space-3);
  padding: 6px var(--olladroid-space-4);
  padding-left: calc(var(--olladroid-space-4) + var(--olladroid-safe-left));
  padding-right: calc(var(--olladroid-space-4) + var(--olladroid-safe-right));
  border-bottom: 1px solid var(--olladroid-gray-3);
  background: var(--olladroid-gray-1);
  font-family: var(--olladroid-mono);
  font-size: var(--olladroid-font-size-2xs);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--olladroid-gray-5);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.olladroid-info-bar::-webkit-scrollbar {
  display: none;
}

.olladroid-info-bar__group {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  flex: 0 0 auto;
}

.olladroid-info-tag {
  padding: 2px 8px;
  border: 1px solid var(--olladroid-gray-4);
  font-family: var(--olladroid-mono);
  font-size: var(--olladroid-font-size-2xs);
  letter-spacing: 1px;
  color: var(--olladroid-gray-6);
  text-transform: none;
  white-space: nowrap;
}

main#app-root {
  width: 100%;
  max-width: var(--olladroid-max-width);
  margin: 0 auto;
  padding: var(--olladroid-space-5) var(--olladroid-space-4);
  padding-left: calc(var(--olladroid-space-4) + var(--olladroid-safe-left));
  padding-right: calc(var(--olladroid-space-4) + var(--olladroid-safe-right));
  padding-bottom: calc(var(--olladroid-space-6) + var(--olladroid-safe-bottom));
  flex: 1 1 auto;
}

/* -----------------------------------------------------------------------------
 * Controls — square buttons, invert on active
 * -------------------------------------------------------------------------- */

button,
input[type="button"],
input[type="submit"],
input[type="reset"] {
  font-family: var(--olladroid-mono);
  font-size: var(--olladroid-font-size-2xs);
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--olladroid-space-2);
  min-height: var(--olladroid-tap-min);
  min-width: var(--olladroid-tap-min);
  padding: 0 var(--olladroid-space-5);
  background: var(--olladroid-white);
  color: var(--olladroid-black);
  border: 2px solid var(--olladroid-white);
  border-radius: 0;
  cursor: pointer;
  transition: background var(--olladroid-transition-fast),
    color var(--olladroid-transition-fast),
    border-color var(--olladroid-transition-fast);
  user-select: none;
}

button:hover:not(:disabled) {
  background: var(--olladroid-gray-7);
  border-color: var(--olladroid-gray-7);
}

button:active:not(:disabled) {
  background: var(--olladroid-black);
  color: var(--olladroid-white);
  border-color: var(--olladroid-white);
}

button:disabled {
  background: transparent;
  color: var(--olladroid-gray-4);
  border-color: var(--olladroid-gray-4);
  cursor: not-allowed;
}

button[data-variant="accent"] {
  background: var(--olladroid-orange);
  color: var(--olladroid-black);
  border-color: var(--olladroid-orange);
}

button[data-variant="accent"]:hover:not(:disabled) {
  background: var(--olladroid-accent-hover);
  border-color: var(--olladroid-accent-hover);
}

button[data-variant="accent"]:active:not(:disabled) {
  background: var(--olladroid-black);
  color: var(--olladroid-orange);
  border-color: var(--olladroid-orange);
}

button[data-variant="secondary"] {
  background: transparent;
  color: var(--olladroid-white);
  border-color: var(--olladroid-gray-4);
}

button[data-variant="secondary"]:hover:not(:disabled) {
  background: var(--olladroid-gray-2);
  border-color: var(--olladroid-gray-5);
}

button[data-variant="secondary"]:active:not(:disabled) {
  background: var(--olladroid-white);
  color: var(--olladroid-black);
  border-color: var(--olladroid-white);
}

button[data-variant="ghost"] {
  background: transparent;
  color: var(--olladroid-gray-6);
  border-color: transparent;
}

button[data-variant="ghost"]:hover:not(:disabled) {
  color: var(--olladroid-white);
  border-color: var(--olladroid-gray-4);
}

button[data-variant="ghost"]:active:not(:disabled) {
  background: var(--olladroid-white);
  color: var(--olladroid-black);
  border-color: var(--olladroid-white);
}

input[type="text"],
input[type="search"],
input[type="number"],
input[type="email"],
input[type="tel"],
input[type="url"],
input[type="password"],
textarea,
select {
  font-family: var(--olladroid-sans);
  font-size: var(--olladroid-font-size-md);
  display: block;
  width: 100%;
  min-height: var(--olladroid-tap-min);
  padding: var(--olladroid-space-3) 0;
  background: transparent;
  color: var(--olladroid-white);
  border: none;
  border-bottom: 1px solid var(--olladroid-gray-4);
  border-radius: 0;
  line-height: 1.4;
  outline: none;
  transition: border-color var(--olladroid-transition-fast);
}

input:focus,
textarea:focus,
select:focus {
  border-bottom-color: var(--olladroid-white);
}

input::placeholder,
textarea::placeholder {
  color: var(--olladroid-gray-5);
  font-family: var(--olladroid-mono);
  font-size: var(--olladroid-font-size-xs);
  letter-spacing: 1px;
  text-transform: uppercase;
}

label {
  display: block;
  margin-bottom: var(--olladroid-space-2);
  font-family: var(--olladroid-mono);
  font-size: var(--olladroid-font-size-2xs);
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--olladroid-gray-5);
}

/* -----------------------------------------------------------------------------
 * Utility primitives
 * -------------------------------------------------------------------------- */

.olladroid-stack {
  display: flex;
  flex-direction: column;
  gap: var(--olladroid-space-4);
}

.olladroid-stack--tight {
  gap: var(--olladroid-space-2);
}

.olladroid-stack--loose {
  gap: var(--olladroid-space-6);
}

/* Double-border card — TE-style section container. */
.olladroid-card {
  position: relative;
  padding: var(--olladroid-space-4) var(--olladroid-space-5);
  background: var(--olladroid-gray-1);
  border: 1px solid var(--olladroid-gray-3);
}

.olladroid-card--double::before {
  content: "";
  position: absolute;
  top: 4px;
  left: 4px;
  right: -4px;
  bottom: -4px;
  border: 1px solid var(--olladroid-gray-3);
  pointer-events: none;
}

/* Banner: inline notifications. Border-only, uppercase mono label. */
.olladroid-banner {
  display: flex;
  align-items: center;
  gap: var(--olladroid-space-3);
  padding: var(--olladroid-space-3) var(--olladroid-space-4);
  background: var(--olladroid-gray-1);
  border: 1px solid var(--olladroid-gray-4);
  font-family: var(--olladroid-mono);
  font-size: var(--olladroid-font-size-xs);
  letter-spacing: 0.5px;
  color: var(--olladroid-gray-7);
}

.olladroid-banner::before {
  content: "!";
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  flex: 0 0 auto;
  background: var(--olladroid-gray-4);
  color: var(--olladroid-white);
  font-weight: 700;
  border-radius: 0;
}

.olladroid-banner[data-tone="warn"] {
  border-color: var(--olladroid-orange);
  color: var(--olladroid-white);
}

.olladroid-banner[data-tone="warn"]::before {
  background: var(--olladroid-orange);
  color: var(--olladroid-black);
}

.olladroid-banner[data-tone="err"] {
  border-color: var(--olladroid-gray-5);
  color: var(--olladroid-gray-6);
}

.olladroid-banner[data-tone="err"]::before {
  content: "X";
  background: var(--olladroid-gray-5);
  color: var(--olladroid-white);
}

.olladroid-banner[data-tone="ok"] {
  border-color: var(--olladroid-white);
}

.olladroid-banner[data-tone="ok"]::before {
  content: "✓";
  background: var(--olladroid-white);
  color: var(--olladroid-black);
}

/* Visually hidden, still readable by screen readers. */
.olladroid-sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* -----------------------------------------------------------------------------
 * Responsive tweaks — mobile-first, one breakpoint at tablet/desktop
 * -------------------------------------------------------------------------- */

@media (min-width: 48rem) {
  :root {
    --olladroid-header-height: 56px;
  }

  .olladroid-header {
    padding-left: calc(var(--olladroid-space-5) + var(--olladroid-safe-left));
    padding-right: calc(var(--olladroid-space-5) + var(--olladroid-safe-right));
  }

  .olladroid-info-bar {
    padding-left: calc(var(--olladroid-space-5) + var(--olladroid-safe-left));
    padding-right: calc(var(--olladroid-space-5) + var(--olladroid-safe-right));
  }

  main#app-root {
    padding: var(--olladroid-space-6) var(--olladroid-space-5);
    padding-left: calc(var(--olladroid-space-5) + var(--olladroid-safe-left));
    padding-right: calc(var(--olladroid-space-5) + var(--olladroid-safe-right));
  }
}

/* -----------------------------------------------------------------------------
 * Motion preferences
 * -------------------------------------------------------------------------- */

@media (prefers-reduced-motion: reduce) {
  *,

    justify-content: center;

    color: var(--olladroid-black);
    font-size: 9px;
    font-weight: 700;
  }

  .sm-label__line {

    height: 1px;
    background: var(--olladroid-gray-3);

    font-variant-numeric: tabular-nums;
  }

  /* Thinking indicator — TE-style orange pulse square + label. */
  .sm-thinking {
    display: flex;
    align-items: center;
    gap: var(--olladroid-space-3);
    padding: var(--olladroid-space-5) 0;
    font-family: var(--olladroid-mono);
    font-size: var(--olladroid-font-size-sm);
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--olladroid-white);
  }

  .sm-thinking__dot {
    display: inline-block;
    width: 14px;
    height: 14px;
    background: var(--olladroid-orange);
    animation: sm-pulse 900ms steps(1, end) infinite;
  }

  @keyframes sm-pulse {
    0%, 50% { opacity: 1; }
    50.01%, 100% { opacity: 0.25; }
  }

  @media (prefers-reduced-motion: reduce) {
    .sm-thinking__dot { animation: none; opacity: 1; }
  }

  /* Summary result cards */
  .sm-result {
    display: flex;
    flex-direction: column;
    gap: var(--olladroid-space-4);
  }

  .sm-card {
    display: flex;
    flex-direction: column;
    gap: var(--olladroid-space-2);
    padding: var(--olladroid-space-4);
    border: 1px solid var(--olladroid-gray-3);
    background: var(--olladroid-black);
  }

  .sm-card__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--olladroid-space-2);
  }

  .sm-card__title {
    font-family: var(--olladroid-mono);
    font-size: var(--olladroid-font-size-2xs);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--olladroid-gray-5);
    margin: 0;
  }

  .sm-card__meta {
    font-family: var(--olladroid-mono);
    font-size: var(--olladroid-font-size-2xs);
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--olladroid-gray-5);
  }

  .sm-card__tldr {
    font-family: var(--olladroid-sans);
    font-size: var(--olladroid-font-size-lg);
    line-height: 1.4;
    color: var(--olladroid-white);
    margin: 0;
  }

  .sm-card__list {
    margin: 0;
    padding: 0;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: var(--olladroid-space-2);
  }

  .sm-card__list li {
    display: flex;
    align-items: flex-start;
    gap: var(--olladroid-space-3);
    font-family: var(--olladroid-sans);
    font-size: var(--olladroid-font-size-md);
    line-height: 1.4;
    color: var(--olladroid-white);
  }

  .sm-card__list li::before {
    content: "";
    display: inline-block;
    flex: 0 0 auto;
    width: 6px;
    height: 6px;
    margin-top: 10px;
    background: var(--olladroid-orange);
  }

  .sm-result__actions {
    display: flex;
    flex-direction: column;
    gap: var(--olladroid-space-2);
  }

  /* Error panel */
  .sm-error {
    display: flex;
    flex-direction: column;
    gap: var(--olladroid-space-3);
  }

  .sm-error__message {
    font-family: var(--olladroid-sans);
    font-size: var(--olladroid-font-size-md);
    line-height: 1.5;
    color: var(--olladroid-white);
    margin: 0;
  }

  /* Spell-bee-style word break for long model output */
  .sm-card__tldr,
  .sm-card__list li {
    overflow-wrap: anywhere;
  }
</style>

<section class="summariser" aria-label="Summariser">
  <div class="sm-top">
    <div>
      <h1 class="sm-top__title" id="sm-title">SUMMARISER</h1>
      <div class="sm-top__subtitle" id="sm-subtitle">TLDR / BULLETS / KEY POINTS</div>
    </div>
    <span class="sm-top__badge" id="sm-state-badge" data-state="idle">READY</span>
  </div>

  <!-- =========================================================================
       Panel: idle — paste + summarise button
       ========================================================================= -->
  <div class="sm-panel" data-state="idle">
    <div class="sm-label">
      <span class="sm-label__num">01</span>
      <span>PASTE TEXT</span>
      <span class="sm-label__line" aria-hidden="true"></span>
    </div>

    <div class="sm-textarea-wrap">
      <label for="paste-input" class="olladroid-sr-only">Text to summarise</label>
      <textarea
        id="paste-input"
        class="sm-textarea"
        placeholder="Paste an article, a meeting transcript, an email thread — anything up to 2000 characters."
        maxlength="2000"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
      ></textarea>
      <div class="sm-counter" id="sm-counter" data-tone="ok">
        <span>CHARS</span>

      </div>

    <button
      id="btn-summarise"
      type="button"
      data-variant="accent"
      disabled
    >Summarise</button>
  </div>

  <!-- =========================================================================
       Panel: thinking — orange pulse while structuredChat runs
       ========================================================================= -->
  <div class="sm-panel" data-state="thinking" hidden>
    <div class="sm-label">
      <span class="sm-label__num">02</span>
      <span>SUMMARISING</span>
      <span class="sm-label__line" aria-hidden="true"></span>
    </div>

    <div class="sm-thinking">
      <span class="sm-thinking__dot" aria-hidden="true"></span>
      <span>Reading your text</span>
    </div>
  </div>

  <!-- =========================================================================
       Panel: showing_summary — TL;DR + bullets + key points
       ========================================================================= -->
  <div class="sm-panel" data-state="showing_summary" hidden>
    <div class="sm-label">
      <span class="sm-label__num">03</span>
      <span>SUMMARY</span>
      <span class="sm-label__line" aria-hidden="true"></span>
    </div>

    <div class="sm-result">
      <div class="sm-card" id="sm-card-tldr">
        <div class="sm-card__header">
          <h2 class="sm-card__title">TLDR</h2>
          <span class="sm-card__meta" id="sm-meta-chars">—</span>
        </div>
        <p class="sm-card__tldr" id="sm-tldr-text"></p>
      </div>

      <div class="sm-card" id="sm-card-bullets">
        <div class="sm-card__header">
          <h2 class="sm-card__title">BULLETS</h2>
          <span class="sm-card__meta" id="sm-meta-bullets">—</span>
        </div>
        <ul class="sm-card__list" id="sm-bullets-list"></ul>
      </div>

      <div class="sm-card" id="sm-card-keypoints">
        <div class="sm-card__header">
          <h2 class="sm-card__title">KEY POINTS</h2>
          <span class="sm-card__meta" id="sm-meta-keypoints">—</span>
        </div>
        <ul class="sm-card__list" id="sm-keypoints-list"></ul>

    </div>

    <div class="sm-result__actions">
      <button id="btn-new-summary" type="button" data-variant="accent">New summary</button>
      <button id="btn-copy" type="button" data-variant="secondary">Copy TLDR</button>
    </div>
  </div>

  <!-- =========================================================================
       Panel: error — structured call failed or returned junk
       ========================================================================= -->
  <div class="sm-panel" data-state="error" hidden>
    <div class="sm-label">
      <span class="sm-label__num">!!</span>
      <span>ERROR</span>
      <span class="sm-label__line" aria-hidden="true"></span>
    </div>

    <div class="olladroid-banner" data-tone="err">
      <p class="sm-error__message" id="sm-error-message">Something went wrong.</p>
    </div>

    <button id="btn-retry" type="button" data-variant="accent">Try again</button>
  </div>
</section>
</main>

  <script>// templates/productivity/summariser/app.js
// Summariser v1 — the controller for a paste-text → structured summary app.
//
// FSM: idle → thinking → (showing_summary | error) → idle
//
// One structuredChat call per summarise:
//   schema: { tldr: string, bullets: string[], key_points: string[] }
//
// Unlike Spell Bee there is no session, no score, no round persistence.
// The only persisted bit of state is the last successful summary under
// SessionManager key "summariser-<slug>", so a reload restores the
// showing_summary panel instead of dropping back to an empty textarea.
// That trades a tiny amount of privacy (last summary sits in
// localStorage) for the common-case ergonomics of closing and reopening
// the PWA without losing what you just produced.
//
// Input is capped at 2000 chars (maxlength on the textarea + a JS
// guard) to stay inside qwen2.5:1.5b's effective mobile context budget.

(function () {
  'use strict';

  // ---------------------------------------------------------------------------
  // Config + SDK lookup
  // ---------------------------------------------------------------------------

  var config = {};
  try {
    var configEl = document.getElementById('app-config');
    if (configEl) config = JSON.parse(configEl.textContent || '{}');
  } catch (err) {
    console.error('[summariser] app-config JSON parse failed:', err);
  }

  var titleEl = document.getElementById('app-title');
  if (titleEl && config.appName) titleEl.textContent = formatTitleMono(config.appName);
  var logoEl = document.getElementById('app-logo');
  if (logoEl && config.appName) logoEl.textContent = buildLogoGlyph(config.appName);
  var modelBadgeEl = document.getElementById('model-badge');
  if (modelBadgeEl && config.defaultModel) modelBadgeEl.textContent = config.defaultModel;
  var hostBadgeEl = document.getElementById('host-badge');
  if (hostBadgeEl) hostBadgeEl.textContent = formatHostLabel(config.host);
  var titleRootEl = document.getElementById('sm-title');
  if (titleRootEl && config.appName) titleRootEl.textContent = formatTitleMono(config.appName);
  var connectionStatusEl = document.getElementById('connection-status');

  function buildLogoGlyph(name) {
    var cleaned = (name || '').replace(/[^a-zA-Z0-9 ]/g, ' ').trim();
    var parts = cleaned.split(/\s+/).filter(Boolean);
    if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return '::';
  }

  function formatHostLabel(host) {
    if (!host) return 'local';
    return host.replace(/^https?:\/\//, '').replace(/:11434$/, '') || 'local';
  }

  function formatTitleMono(name) {
    return (name || '').toUpperCase().replace(/\s+/g, '_');
  }

  if (!window.Olladroid || !window.Olladroid.OllamaClient) {
    console.error('[summariser] window.Olladroid is not loaded — is sdk/olladroid.js inlined correctly?');
    var root = document.querySelector('.summariser');
    if (root) {
      root.innerHTML =
        '<div class="olladroid-banner" data-tone="err">' +
        'SDK failed to load. Refresh the page.' +
        '</div>';
    }
    return;
  }

  var Olladroid = window.Olladroid;

  // ---------------------------------------------------------------------------
  // SDK instances
  // ---------------------------------------------------------------------------

  var client = new Olladroid.OllamaClient({
    host: config.host,
    model: config.defaultModel,
  });

  var session = new Olladroid.SessionManager({
    key: 'summariser-' + (config.appSlug || 'default'),
    maxTurns: 1,
  });

  // ---------------------------------------------------------------------------
  // JSON schema — Ollama grammar-constrained output
  // ---------------------------------------------------------------------------

  var SUMMARY_SCHEMA = {
    type: 'object',
    properties: {
      tldr: { type: 'string' },
      bullets: {
        type: 'array',
        items: { type: 'string' },
      },
      key_points: {
        type: 'array',
        items: { type: 'string' },
      },
    },
    required: ['tldr', 'bullets', 'key_points'],
  };

  var SYSTEM_PROMPT = [
    'You are a precise summarisation assistant.',
    'Always respond with valid JSON only. No prose, no markdown, no code fences.',
    'Never add information that was not present in the source text.',
    'TLDR: one sentence, at most 200 characters, capturing the single most important takeaway.',
    'Bullets: 3 to 5 short sentences, each at most 120 characters, covering the main facts.',
    'Key points: 3 to 5 short phrases naming the distinct topics, names, numbers, or decisions worth remembering.',
    'Prefer the language of the source text.',
  ].join('\n');

  // ---------------------------------------------------------------------------
  // State + element refs
  // ---------------------------------------------------------------------------

  var MAX_CHARS = 2000;
  var WARN_CHARS = 1800;

  var state = 'idle';

  function $(id) {
    return document.getElementById(id);
  }

  var panels = document.querySelectorAll('.sm-panel');
  var stateBadgeEl = $('sm-state-badge');
  var pasteInputEl = $('paste-input');
  var counterEl = $('sm-counter');
  var counterValueEl = $('sm-counter-value');
  var btnSummariseEl = $('btn-summarise');
  var btnNewSummaryEl = $('btn-new-summary');
  var btnCopyEl = $('btn-copy');
  var btnRetryEl = $('btn-retry');
  var tldrTextEl = $('sm-tldr-text');
  var bulletsListEl = $('sm-bullets-list');
  var keypointsListEl = $('sm-keypoints-list');
  var metaCharsEl = $('sm-meta-chars');
  var metaBulletsEl = $('sm-meta-bullets');
  var metaKeypointsEl = $('sm-meta-keypoints');
  var errorMessageEl = $('sm-error-message');

  // Cache the last text so Retry re-runs against the same input without
  // forcing the user to re-paste.
  var lastInput = '';

  // ---------------------------------------------------------------------------
  // FSM transitions
  // ---------------------------------------------------------------------------

  function setState(next) {
    state = next;
    for (var i = 0; i < panels.length; i++) {
      panels[i].hidden = panels[i].dataset.state !== next;
    }
    if (stateBadgeEl) {
      stateBadgeEl.dataset.state = next;
      stateBadgeEl.textContent = badgeLabel(next);
    }
    // Focus the most useful control in each state.
    Promise.resolve().then(function () {
      if (next === 'idle' && pasteInputEl) {
        pasteInputEl.focus();
      } else if (next === 'showing_summary' && btnNewSummaryEl) {
        btnNewSummaryEl.focus();
      } else if (next === 'error' && btnRetryEl) {
        btnRetryEl.focus();
      }
    });
  }

  function badgeLabel(s) {
    if (s === 'idle') return 'READY';
    if (s === 'thinking') return 'THINKING';
    if (s === 'showing_summary') return 'DONE';
    if (s === 'error') return 'ERROR';
    return s.toUpperCase();
  }

  // ---------------------------------------------------------------------------
  // Counter + button enabled state
  // ---------------------------------------------------------------------------

  function updateCounter() {
    if (!pasteInputEl) return;
    var raw = pasteInputEl.value || '';
    // Clamp to MAX_CHARS in case a paste blew past the maxlength attr
    // (some mobile IMEs allow it; better to cut than send garbage).
    if (raw.length > MAX_CHARS) {
      raw = raw.slice(0, MAX_CHARS);
      pasteInputEl.value = raw;
    }
    var n = raw.length;
    if (counterValueEl) counterValueEl.textContent = String(n);
    if (counterEl) {
      if (n >= MAX_CHARS) counterEl.dataset.tone = 'err';
      else if (n >= WARN_CHARS) counterEl.dataset.tone = 'warn';
      else counterEl.dataset.tone = 'ok';
    }
    if (btnSummariseEl) {
      btnSummariseEl.disabled = n === 0;
    }
  }

  // ---------------------------------------------------------------------------
  // Summarise flow — one structuredChat call, then render
  // ---------------------------------------------------------------------------

  function runSummarise() {
    if (!pasteInputEl) return;
    var text = (pasteInputEl.value || '').trim();
    if (!text) return;
    lastInput = text;
    setState('thinking');

    var messages = [
      { role: 'system', content: SYSTEM_PROMPT },
      { role: 'user', content: 'Summarise the following text.\n\n---\n' + text + '\n---\nReturn valid JSON matching the schema.' },
    ];

    client.structuredChat(messages, SUMMARY_SCHEMA).then(
      function (response) {
        if (!response || typeof response.tldr !== 'string' || !response.tldr.trim()) {
          throw new Error('empty tldr in response');
        }
        var summary = normaliseSummary(response);
        renderSummary(summary, text);
        persist(summary, text);
        setState('showing_summary');
      },
      function (err) {
        console.warn('[summariser] structuredChat failed:', err);
        showError(err);
      }
    );
  }

  function normaliseSummary(raw) {
    return {
      tldr: String(raw.tldr || '').trim().slice(0, 400),
      bullets: Array.isArray(raw.bullets)
        ? raw.bullets.map(function (b) { return String(b || '').trim(); }).filter(Boolean).slice(0, 8)
        : [],
      key_points: Array.isArray(raw.key_points)
        ? raw.key_points.map(function (k) { return String(k || '').trim(); }).filter(Boolean).slice(0, 8)
        : [],
    };
  }

  function renderSummary(summary, sourceText) {
    if (tldrTextEl) tldrTextEl.textContent = summary.tldr || '—';
    if (metaCharsEl) metaCharsEl.textContent = (sourceText.length + ' CHARS IN');
    renderList(bulletsListEl, summary.bullets, 'No bullets returned.');
    if (metaBulletsEl) metaBulletsEl.textContent = summary.bullets.length + ' ITEMS';
    renderList(keypointsListEl, summary.key_points, 'No key points returned.');
    if (metaKeypointsEl) metaKeypointsEl.textContent = summary.key_points.length + ' ITEMS';
  }

  function renderList(listEl, items, emptyLabel) {
    if (!listEl) return;
    // Clear previous children without innerHTML= to avoid any chance of
    // content from a hostile model sneaking through as markup.
    while (listEl.firstChild) listEl.removeChild(listEl.firstChild);
    if (!items || items.length === 0) {
      var li = document.createElement('li');
      li.textContent = emptyLabel;
      listEl.appendChild(li);
      return;
    }
    for (var i = 0; i < items.length; i++) {
      var item = document.createElement('li');
      item.textContent = items[i];
      listEl.appendChild(item);
    }
  }

  function showError(err) {
    if (errorMessageEl) {
      var msg;
      if (err && err.name === 'StructuredChatError') {
        msg = 'The model returned output that did not match the expected shape. Try a shorter input or run: ollama pull qwen2.5:1.5b';
      } else if (err && /fetch|network|failed to fetch/i.test(err.message || '')) {
        msg = 'Could not reach the Ollama host at ' + (config.host || 'localhost') + '. Is the server running?';
      } else {
        msg = (err && err.message) ? err.message : 'Unknown error while summarising.';
      }
      errorMessageEl.textContent = msg;
    }
    setState('error');
  }

  // ---------------------------------------------------------------------------
  // Persistence — restore the last successful summary on load
  // ---------------------------------------------------------------------------

  function persist(summary, sourceText) {
    try {
      session.save({ summary: summary, sourceText: sourceText, savedAt: Date.now() });
    } catch (err) {
      console.warn('[summariser] session.save failed (non-fatal):', err);
    }
  }

  function restore() {
    var saved = null;
    try {
      saved = session.load();
    } catch (err) {
      console.warn('[summariser] session.load failed:', err);
      return;
    }
    if (!saved || typeof saved !== 'object' || !saved.summary) return;
    lastInput = String(saved.sourceText || '');
    if (pasteInputEl) pasteInputEl.value = lastInput;
    updateCounter();
    renderSummary(saved.summary, lastInput);
    setState('showing_summary');
  }

  // ---------------------------------------------------------------------------
  // Event wiring
  // ---------------------------------------------------------------------------

  if (pasteInputEl) {
    pasteInputEl.addEventListener('input', updateCounter);
    pasteInputEl.addEventListener('keydown', function (e) {
      // Ctrl/Cmd+Enter submits — standard textarea shortcut convention.
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runSummarise();
      }
    });
  }

  if (btnSummariseEl) btnSummariseEl.addEventListener('click', runSummarise);
  if (btnRetryEl) btnRetryEl.addEventListener('click', runSummarise);
  if (btnNewSummaryEl) {
    btnNewSummaryEl.addEventListener('click', function () {
      if (pasteInputEl) {
        pasteInputEl.value = '';
        updateCounter();
      }
      lastInput = '';
      setState('idle');
    });
  }

  if (btnCopyEl) {
    btnCopyEl.addEventListener('click', function () {
      var text = tldrTextEl ? tldrTextEl.textContent || '' : '';
      if (!text) return;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(
          function () {
            flashButton(btnCopyEl, 'Copied!');
          },
          function () {
            flashButton(btnCopyEl, 'Copy failed');
          }
        );
      } else {
        flashButton(btnCopyEl, 'No clipboard');
      }
    });
  }

  function flashButton(btn, label) {
    var original = btn.textContent;
    btn.textContent = label;
    btn.disabled = true;
    setTimeout(function () {
      btn.textContent = original;
      btn.disabled = false;
    }, 1200);
  }

  // ---------------------------------------------------------------------------
  // Boot
  // ---------------------------------------------------------------------------

  updateCounter();
  restore();
  if (state === 'idle' && connectionStatusEl) {
    // Best-effort connectivity check. ping() always resolves — either with
    // { ok: true, models: [...] } or { ok: false, error: ... }. Never
    // rejects. Doesn't block the UI; if the host is actually unreachable
    // we'll surface the error on the first Summarise click anyway.
    client.ping().then(function (result) {
      if (result && result.ok) {
        connectionStatusEl.dataset.state = 'ok';
        connectionStatusEl.textContent = 'connected';
      } else {
        connectionStatusEl.dataset.state = 'err';
        connectionStatusEl.textContent = 'offline';
      }
    });
  }
})();
</script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function () {});
    }
  </script>
</body>
