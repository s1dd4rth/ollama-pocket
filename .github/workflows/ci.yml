name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: error

  sdk-tests:
    name: SDK tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The plan targets Node 18+ as the minimum (matches what
        # install-ollama.sh provisions via Termux). We matrix against 18 AND
        # 20 so any accidental use of a Node-20-only API catches the 18 job
        # at review time, not after release.
        node-version: ['18', '20']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run SDK unit tests
        run: node --test sdk/test/*.test.js

  cli-tests:
    name: CLI tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run CLI unit tests
        run: node --test cli/test/*.test.js

  scaffold-drift:
    name: Scaffold drift (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20']
    # Regenerates the committed examples/spell-bee/ reference output from
    # the current templates + SDK + scaffolder and fails the build if the
    # regenerated bytes differ from the committed copy. Forces every edit
    # to sdk/, templates/_base/, templates/kids-game/spell-bee/, or
    # cli/scaffold.js to be accompanied by a matching examples/ update.
    #
    # The --scaffolded-at flag pins APP_CONFIG.scaffoldedAt so two runs
    # produce byte-identical output. Fonts under examples/*/fonts/ are
    # gitignored — they're copies of pwa/fonts/ and don't need separate
    # drift coverage.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Re-scaffold examples/spell-bee
        run: |
          rm -rf examples/spell-bee
          node cli/new.js \
            --non-interactive \
            --slug spell-bee \
            --template kids-game/spell-bee \
            --age-group 6-8 \
            --model qwen2.5:1.5b \
            --host http://localhost:11434 \
            --output examples/spell-bee \
            --skip-detection \
            --scaffolded-at 2026-01-01T00:00:00.000Z
      - name: Check for drift
        run: |
          if ! git diff --exit-code -- examples/; then
            echo ""
            echo "::error::examples/spell-bee/ is out of sync with the templates."
            echo "Run: node cli/new.js --non-interactive --slug spell-bee \\"
            echo "       --template kids-game/spell-bee --age-group 6-8 \\"
            echo "       --model qwen2.5:1.5b --host http://localhost:11434 \\"
            echo "       --output examples/spell-bee --skip-detection \\"
            echo "       --scaffolded-at 2026-01-01T00:00:00.000Z"
            echo "and commit the result."
            exit 1
          fi
