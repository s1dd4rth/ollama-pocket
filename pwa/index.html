<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>OLLAMA_POCKET</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
@font-face {
  font-family: 'Space Mono';
  src: url('./fonts/space-mono-regular.woff2') format('woff2');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Space Mono';
  src: url('./fonts/space-mono-bold.woff2') format('woff2');
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'DM Sans';
  src: url('./fonts/dm-sans-variable.woff2') format('woff2-variations'),
       url('./fonts/dm-sans-variable.woff2') format('woff2');
  font-weight: 100 1000;
  font-style: normal;
  font-display: swap;
}

:root {
  --black: #000000;
  --white: #ffffff;
  --gray-1: #111111;
  --gray-2: #1a1a1a;
  --gray-3: #222222;
  --gray-4: #333333;
  --gray-5: #666666;
  --gray-6: #999999;
  --gray-7: #cccccc;
  --orange: #ff5c00;
  --mono: 'Space Mono', 'Courier New', monospace;
  --sans: 'DM Sans', -apple-system, sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  min-height: 100%;
  min-height: 100dvh;
  background: var(--black);
  color: var(--white);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
}

body {
  padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bottom) + 32px);
  max-width: 720px;
  margin: 0 auto;
}

a {
  color: inherit;
  text-decoration: none;
}

button {
  font: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
}

/* ========================================================================== */
/* Header                                                                     */
/* ========================================================================== */

.launcher-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--gray-3);
}

.launcher-header__left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.launcher-logo {
  width: 28px;
  height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--white);
  color: var(--black);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  flex: 0 0 auto;
}

.launcher-title {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.launcher-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gray-6);
}

.launcher-status::before {
  content: "";
  display: inline-block;
  width: 8px;
  height: 8px;
  background: var(--gray-5);
}

.launcher-status[data-state="ok"] {
  color: var(--white);
}
.launcher-status[data-state="ok"]::before {
  background: var(--white);
}
.launcher-status[data-state="err"] {
  color: var(--orange);
}
.launcher-status[data-state="err"]::before {
  background: var(--orange);
}

/* ========================================================================== */
/* Info strip (kicker + version)                                              */
/* ========================================================================== */

.launcher-kicker {
  padding: 20px 0 12px;
  border-bottom: 1px solid var(--gray-3);
}

.launcher-kicker__line1 {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray-5);
  margin-bottom: 6px;
}

.launcher-kicker__line2 {
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1;
  color: var(--white);
  margin-bottom: 12px;
}

.launcher-kicker__meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gray-6);
}

.launcher-kicker__meta span {
  padding: 3px 6px;
  border: 1px solid var(--gray-3);
}

/* ========================================================================== */
/* Section label                                                              */
/* ========================================================================== */

.launcher-section {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 24px 0 12px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray-5);
}

.launcher-section__num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 4px;
  background: var(--white);
  color: var(--black);
  font-size: 9px;
  font-weight: 700;
}

.launcher-section__line {
  flex: 1 1 auto;
  height: 1px;
  background: var(--gray-3);
}

.launcher-section__count {
  color: var(--gray-6);
  font-weight: 400;
}

/* ========================================================================== */
/* Tile grid                                                                  */
/* ========================================================================== */

.launcher-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

@media (min-width: 520px) {
  .launcher-grid {
    grid-template-columns: 1fr 1fr;
  }
}

.launcher-tile {
  display: flex;
  gap: 14px;
  align-items: stretch;
  padding: 16px;
  background: var(--gray-1);
  border: 1px solid var(--gray-3);
  transition: border-color 120ms, background 120ms;
  min-height: 96px;
}

.launcher-tile:focus-visible {
  outline: 2px solid var(--orange);
  outline-offset: 2px;
}

.launcher-tile:hover,
.launcher-tile:active {
  background: var(--gray-2);
  border-color: var(--white);
}

.launcher-tile__icon {
  width: 56px;
  height: 56px;
  flex: 0 0 auto;
  background: var(--black);
  border: 1px solid var(--gray-4);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.launcher-tile__icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.launcher-tile__icon-fallback {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -1px;
}

.launcher-tile__body {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-width: 0;
  flex: 1 1 auto;
  gap: 8px;
}

.launcher-tile__name {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--white);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.launcher-tile__desc {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 400;
  line-height: 1.35;
  color: var(--gray-7);
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.launcher-tile__meta {
  display: flex;
  gap: 8px;
  align-items: center;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gray-6);
}

.launcher-tile__badge {
  padding: 2px 5px;
  background: var(--gray-3);
  color: var(--white);
}

.launcher-tile__badge[data-builtin="true"] {
  background: var(--white);
  color: var(--black);
}

/* ========================================================================== */
/* Empty state                                                                */
/* ========================================================================== */

.launcher-empty {
  padding: 32px 16px;
  border: 1px dashed var(--gray-4);
  background: var(--gray-1);
  text-align: center;
}

.launcher-empty__title {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--white);
  margin-bottom: 8px;
}

.launcher-empty__body {
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
  color: var(--gray-7);
  max-width: 38ch;
  margin: 0 auto 12px;
}

.launcher-empty__cmd {
  display: inline-block;
  padding: 6px 10px;
  background: var(--black);
  border: 1px solid var(--gray-4);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--orange);
  user-select: all;
}

/* ========================================================================== */
/* Footer                                                                     */
/* ========================================================================== */

.launcher-footer {
  margin-top: 28px;
  padding-top: 16px;
  border-top: 1px solid var(--gray-3);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gray-5);
  text-align: center;
}

@media (prefers-reduced-motion: reduce) {
  .launcher-tile {
    transition: none;
  }
}
</style>
</head>
<body>
  <header class="launcher-header">
    <div class="launcher-header__left">
      <span class="launcher-logo" aria-hidden="true">OP</span>
      <span class="launcher-title">OLLAMA_POCKET</span>
    </div>
    <span class="launcher-status" id="ping-status" data-state="init">Checking</span>
  </header>

  <section class="launcher-kicker" aria-labelledby="kicker-title">
    <div class="launcher-kicker__line1">Launcher</div>
    <h1 class="launcher-kicker__line2" id="kicker-title">YOUR&nbsp;APPS</h1>
    <div class="launcher-kicker__meta">
      <span id="meta-host">HOST LOCALHOST</span>
      <span id="meta-count">— APPS</span>
      <span id="meta-updated">—</span>
    </div>
  </section>

  <div class="launcher-section">
    <span class="launcher-section__num">01</span>
    <span>INSTALLED</span>
    <span class="launcher-section__line" aria-hidden="true"></span>
    <span class="launcher-section__count" id="section-count">—</span>
  </div>

  <div class="launcher-grid" id="app-grid" aria-label="Installed apps"></div>

  <div class="launcher-empty" id="empty-state" hidden>
    <div class="launcher-empty__title">No scaffolded apps yet</div>
    <p class="launcher-empty__body">
      Run the scaffolder to create your first local AI mini-app. Every new
      app gets a tile here the moment it lands on disk.
    </p>
    <code class="launcher-empty__cmd">node cli/new.js</code>
  </div>

  <footer class="launcher-footer">
    ollama-pocket · private · offline · on-device
  </footer>

<script>
(function () {
  'use strict';

  // -------------------------------------------------------------------------
  // Config
  // -------------------------------------------------------------------------

  var MANIFEST_URL = './apps.json';
  var OLLAMA_URL = 'http://127.0.0.1:11434/api/tags';

  // -------------------------------------------------------------------------
  // DOM refs
  // -------------------------------------------------------------------------

  var gridEl = document.getElementById('app-grid');
  var emptyEl = document.getElementById('empty-state');
  var countEl = document.getElementById('meta-count');
  var sectionCountEl = document.getElementById('section-count');
  var updatedEl = document.getElementById('meta-updated');
  var hostEl = document.getElementById('meta-host');
  var pingStatusEl = document.getElementById('ping-status');

  // -------------------------------------------------------------------------
  // Helpers
  // -------------------------------------------------------------------------

  function escapeHTML(str) {
    return String(str == null ? '' : str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function initialsFor(name) {
    var cleaned = String(name || '').replace(/[^a-zA-Z0-9 ]/g, ' ').trim();
    if (!cleaned) return '::';
    var parts = cleaned.split(/\s+/).filter(Boolean);
    if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
    return parts[0].slice(0, 2).toUpperCase();
  }

  function formatUpdated(iso) {
    if (!iso) return '';
    try {
      var d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      var now = new Date();
      var ms = now.getTime() - d.getTime();
      var hours = Math.floor(ms / 3600000);
      if (hours < 1) return 'UPDATED JUST NOW';
      if (hours < 24) return 'UPDATED ' + hours + 'H AGO';
      var days = Math.floor(hours / 24);
      if (days === 1) return 'UPDATED 1D AGO';
      return 'UPDATED ' + days + 'D AGO';
    } catch (_) {
      return '';
    }
  }

  function buildTile(app) {
    // Safer than innerHTML: construct elements by hand so user-provided
    // description/name strings can't inject markup.
    var a = document.createElement('a');
    a.className = 'launcher-tile';
    a.href = app.href || '#';
    a.setAttribute('aria-label', app.name + ': ' + (app.description || ''));
    // The launcher and scaffolded apps share the localhost origin so
    // same-window navigation is fine — the PWA shell unloads and the new
    // app takes its place.
    a.setAttribute('data-slug', app.slug);
    if (app.category) a.setAttribute('data-category', app.category);

    var iconWrap = document.createElement('div');
    iconWrap.className = 'launcher-tile__icon';
    if (app.icon) {
      var img = document.createElement('img');
      img.src = app.icon;
      img.alt = '';
      img.loading = 'lazy';
      img.decoding = 'async';
      img.addEventListener('error', function () {
        // Icon load failed — fall back to initials.
        iconWrap.removeChild(img);
        var fb = document.createElement('span');
        fb.className = 'launcher-tile__icon-fallback';
        fb.textContent = initialsFor(app.name);
        iconWrap.appendChild(fb);
      });
      iconWrap.appendChild(img);
    } else {
      var fb = document.createElement('span');
      fb.className = 'launcher-tile__icon-fallback';
      fb.textContent = initialsFor(app.name);
      iconWrap.appendChild(fb);
    }

    var body = document.createElement('div');
    body.className = 'launcher-tile__body';

    var name = document.createElement('div');
    name.className = 'launcher-tile__name';
    name.textContent = app.name || app.slug || '—';

    var desc = document.createElement('div');
    desc.className = 'launcher-tile__desc';
    desc.textContent = app.description || '';

    var meta = document.createElement('div');
    meta.className = 'launcher-tile__meta';
    var cat = document.createElement('span');
    cat.className = 'launcher-tile__badge';
    cat.setAttribute('data-builtin', app.builtin ? 'true' : 'false');
    cat.textContent = app.category || (app.builtin ? 'BUILTIN' : 'APP');
    meta.appendChild(cat);

    body.appendChild(name);
    body.appendChild(desc);
    body.appendChild(meta);

    a.appendChild(iconWrap);
    a.appendChild(body);
    return a;
  }

  function render(manifest) {
    while (gridEl.firstChild) gridEl.removeChild(gridEl.firstChild);
    var apps = (manifest && Array.isArray(manifest.apps)) ? manifest.apps : [];
    if (apps.length === 0) {
      emptyEl.hidden = false;
    } else {
      emptyEl.hidden = true;
      for (var i = 0; i < apps.length; i++) {
        gridEl.appendChild(buildTile(apps[i]));
      }
    }
    var n = apps.length;
    countEl.textContent = n + ' APPS';
    sectionCountEl.textContent = String(n).padStart(2, '0');
    updatedEl.textContent = formatUpdated(manifest && manifest.updatedAt);
  }

  // -------------------------------------------------------------------------
  // Fetch manifest + Ollama ping
  // -------------------------------------------------------------------------

  function loadManifest() {
    return fetch(MANIFEST_URL, { cache: 'no-cache' })
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function (data) {
        if (!data || !Array.isArray(data.apps)) {
          throw new Error('apps.json missing `apps` array');
        }
        return data;
      });
  }

  function pingOllama() {
    // Ollama might not be listening on 127.0.0.1 when the launcher runs
    // over WiFi; fall back to the same-origin /api/tags path in case the
    // PWA server proxies it. Best-effort — never blocks the UI.
    var attempts = [
      OLLAMA_URL,
      (location.protocol + '//' + location.hostname + ':11434/api/tags'),
    ];
    return Promise.allSettled(attempts.map(function (u) {
      return fetch(u, { cache: 'no-cache' }).then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      });
    })).then(function (results) {
      for (var i = 0; i < results.length; i++) {
        if (results[i].status === 'fulfilled') return results[i].value;
      }
      throw new Error('ollama not reachable');
    });
  }

  // -------------------------------------------------------------------------
  // Boot
  // -------------------------------------------------------------------------

  if (hostEl) {
    hostEl.textContent = 'HOST ' + (location.hostname || 'LOCALHOST').toUpperCase();
  }

  loadManifest().then(function (manifest) {
    render(manifest);
  }, function (err) {
    console.error('[launcher] failed to load apps.json:', err);
    render({ apps: [] });
    if (emptyEl) {
      var title = emptyEl.querySelector('.launcher-empty__title');
      var body = emptyEl.querySelector('.launcher-empty__body');
      if (title) title.textContent = 'COULD NOT LOAD APPS.JSON';
      if (body) body.textContent = 'Check that pwa/apps.json exists and is valid JSON. Until then, the launcher has nothing to show.';
    }
  });

  pingOllama().then(function (data) {
    pingStatusEl.dataset.state = 'ok';
    var n = (data && Array.isArray(data.models)) ? data.models.length : 0;
    pingStatusEl.textContent = n + ' MODEL' + (n === 1 ? '' : 'S');
  }, function () {
    pingStatusEl.dataset.state = 'err';
    pingStatusEl.textContent = 'Offline';
  });

  // Service worker registration — reuses the existing pwa/sw.js from the
  // v0.1.0 chat install. The launcher and chat share an origin and cache.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function () {});
  }
})();
</script>
</body>
</html>
